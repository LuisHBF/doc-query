server:
  port: 8082

spring:
  application:
    name: embedding-service
  datasource:
    url: jdbc:postgresql://localhost:5432/docquery
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
  ai:
    ollama:
      base-url: http://localhost:11434
      embedding:
        model: nomic-embed-text