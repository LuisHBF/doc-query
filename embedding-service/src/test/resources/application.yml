spring:
  config:
    import: ""
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    open-in-view: false
  flyway:
    enabled: false
  ai:
    ollama:
      base-url: http://localhost:11434
      embedding:
        model: nomic-embed-text

eureka:
  client:
    enabled: false

management:
  tracing:
    enabled: false

logging:
  level:
    com.github.loki4j: OFF
    com.netflix.eureka: OFF
    com.netflix.discovery: OFF
