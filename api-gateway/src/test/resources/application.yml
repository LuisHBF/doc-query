spring:
  config:
    import: ""
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    open-in-view: false
  flyway:
    enabled: false

eureka:
  client:
    enabled: false

management:
  tracing:
    enabled: false

jwt:
  secret: "test-secret-key-for-unit-tests-must-be-at-least-256-bits-long-abc123"
  expiration: 86400000

logging:
  level:
    com.github.loki4j: OFF
    com.netflix.eureka: OFF
    com.netflix.discovery: OFF
