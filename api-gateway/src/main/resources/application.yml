server:
  port: 8080

spring:
  application:
    name: api-gateway
  datasource:
    url: jdbc:postgresql://localhost:5432/docquery
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
  flyway:
    enabled: false
  config:
    import: "optional:configserver:"

management:
  endpoints:
    web:
      exposure:
        include: health, prometheus
  metrics:
    export:
      prometheus:
        enabled: true

tracing:
  sampling:
    probability: 1.0

jwt:
  secret: ${JWT_SECRET:3d8f2a1b9c7e4f6d0a5b8c3e1f7d2a9b4c6e8f0d3a5b7c9e1f4d6a8b0c2e4f6d}
  expiration: ${JWT_EXPIRATION:86400000}

logging:
  level:
    br.com.docquery.gateway: DEBUG
  pattern:
    level: "%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]"
