spring:
  config:
    import: ""
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
  flyway:
    enabled: true
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest

eureka:
  client:
    enabled: false

management:
  tracing:
    enabled: false

logging:
  level:
    com.github.loki4j: OFF
    com.netflix.eureka: OFF
    com.netflix.discovery: OFF
